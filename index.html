<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#f7f7f5">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <title>Rhymage Apps</title>
  <meta name="description" content="Rhymage의 웹앱, 플러그인, 스크립트, 확장 프로그램">
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f7f5;
      --surface: #fff;
      --text: #171817;
      --muted: #777b76;
      --line: #e6e7e3;
      --soft: #f2f3f0;
      font-family: Pretendard, system-ui, sans-serif;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background: var(--bg);
    }
    a { color: inherit; }
    .shell { width: min(1040px, calc(100% - 40px)); margin: 0 auto; }

    header { border-bottom: 1px solid var(--line); }
    .nav {
      min-height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }
    .brand {
      font-size: 16px;
      font-weight: 750;
      letter-spacing: -.025em;
      text-decoration: none;
    }
    .nav-actions, .nav-links { display: flex; align-items: center; }
    .nav-actions { gap: 16px; }
    .nav-links { gap: 20px; }
    .nav-links a, footer a {
      color: var(--muted);
      font-size: 12px;
      text-decoration: none;
      transition: color .18s ease;
    }
    .nav-links a:hover, footer a:hover { color: var(--text); }
    .lang-toggle {
      min-width: 36px;
      height: 28px;
      padding: 0 9px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--muted);
      background: var(--surface);
      font: 700 11px/1 Pretendard, system-ui, sans-serif;
      cursor: pointer;
      transition: color .18s ease, border-color .18s ease, background .18s ease;
    }
    .lang-toggle:hover { color: var(--text); border-color: #d5d7d1; background: var(--soft); }

    main { padding: 68px 0 96px; }
    .intro { margin-bottom: 34px; }
    h1 {
      margin: 0 0 8px;
      font-size: 26px;
      line-height: 1.25;
      letter-spacing: -.045em;
    }
    .intro p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
      letter-spacing: -.015em;
    }

    .category + .category { margin-top: 38px; }
    .category-title {
      margin: 0 0 12px;
      color: #666b65;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
    }
    .apps {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 12px;
    }
    .app-card {
      min-width: 0;
      display: grid;
      grid-template-columns: 42px minmax(0, 1fr) 20px;
      align-items: center;
      gap: 14px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--surface);
      text-decoration: none;
      transition: border-color .18s ease, box-shadow .18s ease, transform .18s ease;
    }
    .app-card:hover {
      border-color: #d5d7d1;
      box-shadow: 0 8px 24px rgba(24, 27, 22, .06);
      transform: translateY(-2px);
    }
    .icon {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border-radius: 11px;
      background: var(--soft);
      color: #555a54;
      font-size: 16px;
      font-weight: 750;
    }
    .stock .icon { color: #986413; background: #fbf3e4; }
    .coin .icon { color: #3b648b; background: #ebf3f8; }
    .chrome .icon { color: #31724a; background: #eaf5ed; }
    .unreal .icon { color: #3f647c; background: #eaf1f5; }
    .ae .icon { color: #6351a4; background: #f0edfa; }
    .c4d .icon { color: #456aa8; background: #edf2fa; }
    .app-card h2 {
      margin: 0 0 4px;
      overflow: hidden;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -.025em;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .app-card p {
      margin: 0;
      overflow: hidden;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
      letter-spacing: -.015em;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .arrow {
      color: #b0b4ad;
      transition: color .18s ease, transform .18s ease;
    }
    .app-card:hover .arrow { color: #4f544e; transform: translateX(2px); }

    footer {
      border-top: 1px solid var(--line);
      color: #969a94;
    }
    .footer-inner {
      min-height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      font-size: 11px;
    }
    .footer-links { display: flex; gap: 18px; }

    @media (max-width: 620px) {
      .shell { width: min(100% - 28px, 480px); }
      main { padding: 46px 0 72px; }
      .intro { margin-bottom: 24px; }
      h1 { font-size: 23px; }
      .apps { grid-template-columns: 1fr; gap: 9px; }
      .app-card { padding: 14px; border-radius: 12px; }
      .nav { gap: 12px; }
      .nav-actions { gap: 10px; }
      .nav-links { gap: 12px; }
      .footer-inner { min-height: 76px; align-items: flex-start; flex-direction: column; justify-content: center; gap: 9px; }
    }

    @media (prefers-reduced-motion: reduce) {
      * { transition: none !important; }
    }
  </style>
</head>
<body data-page="home">
  <header>
    <div class="shell nav">
      <a class="brand" href="/">Rhymage Apps</a>
      <div class="nav-actions">
        <nav class="nav-links" aria-label="주요 메뉴" data-i18n-aria="navLabel">
          <a href="/about.html" data-i18n="navAbout">소개</a>
          <a href="/privacy.html" data-i18n="navPrivacy">개인정보처리방침</a>
        </nav>
        <button class="lang-toggle" id="lang-toggle" type="button">EN</button>
      </div>
    </div>
  </header>

  <main>
    <div class="shell">
      <section class="intro">
        <h1>Apps</h1>
        <p data-i18n="intro">웹앱, 플러그인, 스크립트와 확장 프로그램을 만들고 있습니다.</p>
      </section>

      <section class="category" aria-labelledby="web-title">
        <h2 class="category-title" id="web-title">Web Apps</h2>
        <div class="apps">
          <a class="app-card stock" href="/stockgame/">
            <span class="icon" aria-hidden="true">ST</span><span><h2 data-i18n="stockTitle">단타 적성검사</h2><p data-i18n="stockDesc">차트만 보고 확인하는 단타 감각</p></span><svg class="arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="m9 18 6-6-6-6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </a>
          <a class="app-card coin" href="/coingame/">
            <span class="icon" aria-hidden="true">₿</span><span><h2 data-i18n="coinTitle">코인선물 적성검사</h2><p data-i18n="coinDesc">롱·숏 선택으로 확인하는 선물 감각</p></span><svg class="arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="m9 18 6-6-6-6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </a>
        </div>
      </section>
    </div>
  </main>

  <footer>
    <div class="shell footer-inner">
      <span>Copyright © 2026 리메이지. All rights reserved.</span>
      <div class="footer-links">
        <a href="/about.html" data-i18n="navAbout">소개</a>
        <a href="/privacy.html" data-i18n="navPrivacy">개인정보처리방침</a>
      </div>
    </div>
  </footer>
  <script src="/lang.js?v=1"></script>
</body>
</html>
