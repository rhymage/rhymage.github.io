<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#060912">
  <title>Rhymage Apps</title>
  <meta name="description" content="감이 아니라 선택으로 확인하는 트레이딩 적성 테스트">
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    :root {
      color-scheme: dark;
      --bg: #060912;
      --surface: rgba(9, 14, 27, .82);
      --text: #f4f6fb;
      --muted: #929bb0;
      --line: rgba(153, 177, 221, .15);
      --amber: #ffab24;
      --cyan: #20d5ff;
      --violet: #9a5cff;
      font-family: Pretendard, system-ui, sans-serif;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(circle at 83% 19%, rgba(25, 135, 255, .12), transparent 25rem),
        radial-gradient(circle at 15% 78%, rgba(255, 151, 28, .06), transparent 28rem),
        var(--bg);
    }

    body::before {
      position: fixed;
      inset: 0;
      z-index: -1;
      content: "";
      background-image:
        linear-gradient(rgba(85, 119, 170, .055) 1px, transparent 1px),
        linear-gradient(90deg, rgba(85, 119, 170, .055) 1px, transparent 1px);
      background-size: 72px 72px;
      mask-image: linear-gradient(to bottom, transparent, black 12%, black 80%, transparent);
    }

    a { color: inherit; }
    .shell { width: min(1320px, calc(100% - 48px)); margin: 0 auto; }

    header {
      border-bottom: 1px solid var(--line);
      background: rgba(6, 9, 18, .72);
      backdrop-filter: blur(18px);
    }
    .nav {
      min-height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }
    .brand {
      color: var(--text);
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -.04em;
      text-decoration: none;
    }
    .nav-links { display: flex; gap: 30px; }
    .nav-links a, footer a {
      color: var(--muted);
      font-size: 14px;
      text-decoration: none;
      transition: color .2s ease;
    }
    .nav-links a:hover, footer a:hover { color: var(--text); }

    main { padding: clamp(70px, 10vw, 142px) 0 72px; overflow: hidden; }
    .hero { position: relative; max-width: 900px; }
    .hero::after {
      position: absolute;
      top: -25%;
      left: 70%;
      width: 560px;
      height: 330px;
      content: "";
      opacity: .7;
      background:
        linear-gradient(150deg, transparent 38%, rgba(68, 159, 255, .8) 39%, transparent 39.6%) 0 0 / 120px 90px,
        linear-gradient(25deg, transparent 45%, rgba(32, 213, 255, .32) 46%, transparent 46.6%) 0 0 / 170px 120px;
      mask-image: linear-gradient(90deg, transparent, black 35%, transparent);
      pointer-events: none;
    }
    h1 {
      position: relative;
      z-index: 1;
      margin: 0;
      max-width: 760px;
      font-size: clamp(46px, 7vw, 86px);
      line-height: 1.06;
      letter-spacing: -.075em;
    }
    .hero p {
      margin: 28px 0 0;
      color: #aab2c4;
      font-size: clamp(17px, 2vw, 21px);
      line-height: 1.7;
      letter-spacing: -.02em;
    }

    .apps {
      margin-top: clamp(64px, 8vw, 106px);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }
    .app-card {
      position: relative;
      min-height: 410px;
      padding: clamp(30px, 4vw, 52px);
      overflow: hidden;
      border: 1px solid var(--card-line);
      background:
        radial-gradient(circle at 100% 100%, var(--card-glow), transparent 48%),
        linear-gradient(145deg, rgba(15, 21, 38, .95), rgba(6, 10, 20, .9));
      text-decoration: none;
      clip-path: polygon(0 0, calc(100% - 28px) 0, 100% 28px, 100% 100%, 28px 100%, 0 calc(100% - 28px));
      transition: transform .35s ease, filter .35s ease;
      isolation: isolate;
    }
    .app-card::before {
      position: absolute;
      inset: 0;
      z-index: -1;
      content: "";
      opacity: 0;
      background: linear-gradient(120deg, transparent 30%, var(--card-glow), transparent 70%);
      transition: opacity .35s ease;
    }
    .app-card:hover { transform: translateY(-8px); filter: brightness(1.13); }
    .app-card:hover::before { opacity: .6; }
    .stock {
      --card-line: rgba(255, 171, 36, .8);
      --card-glow: rgba(255, 151, 31, .17);
      --accent: var(--amber);
    }
    .coin {
      --card-line: rgba(81, 169, 255, .85);
      --card-glow: rgba(100, 73, 255, .2);
      --accent: var(--cyan);
    }
    .icon {
      display: grid;
      width: 46px;
      height: 46px;
      place-items: center;
      margin-bottom: 42px;
      border: 1px solid color-mix(in srgb, var(--accent) 70%, transparent);
      border-radius: 50%;
      color: var(--accent);
      font-size: 21px;
      font-weight: 800;
      box-shadow: 0 0 30px color-mix(in srgb, var(--accent) 24%, transparent);
    }
    .stock .icon {
      border: 0;
      border-radius: 0;
      box-shadow: none;
      font-size: 28px;
    }
    .app-card h2 {
      margin: 0 0 18px;
      font-size: clamp(30px, 4vw, 46px);
      line-height: 1.15;
      letter-spacing: -.055em;
    }
    .app-card p {
      max-width: 390px;
      min-height: 58px;
      margin: 0;
      color: #a6afc1;
      font-size: 16px;
      line-height: 1.8;
      letter-spacing: -.02em;
    }
    .cta {
      position: absolute;
      bottom: 46px;
      left: clamp(30px, 4vw, 52px);
      display: inline-flex;
      align-items: center;
      gap: 18px;
      color: var(--accent);
      font-size: 16px;
      font-weight: 800;
    }
    .cta svg { transition: transform .25s ease; }
    .app-card:hover .cta svg { transform: translateX(6px); }

    .chart {
      position: absolute;
      right: -16px;
      bottom: 22px;
      width: 45%;
      height: 42%;
      opacity: .56;
      pointer-events: none;
    }
    .bars {
      display: flex;
      height: 100%;
      align-items: end;
      gap: 9px;
      padding: 0 22px;
      border-bottom: 1px solid color-mix(in srgb, var(--accent) 45%, transparent);
    }
    .bars i {
      width: 9px;
      height: var(--h);
      background: linear-gradient(to top, transparent, var(--accent));
      box-shadow: 0 0 12px color-mix(in srgb, var(--accent) 35%, transparent);
    }
    .long-short::before, .long-short::after {
      position: absolute;
      left: 0;
      width: 100%;
      height: 2px;
      content: "";
      transform-origin: left;
    }
    .long-short::before {
      top: 30%;
      background: linear-gradient(90deg, transparent, var(--cyan));
      transform: rotate(-16deg);
      box-shadow: 0 0 14px var(--cyan);
    }
    .long-short::after {
      top: 53%;
      background: linear-gradient(90deg, transparent, var(--violet));
      transform: rotate(18deg);
      box-shadow: 0 0 14px var(--violet);
    }

    footer {
      border-top: 1px solid var(--line);
      color: #697286;
    }
    .footer-inner {
      min-height: 92px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      font-size: 13px;
    }
    .footer-links { display: flex; gap: 24px; }

    @media (max-width: 820px) {
      .shell { width: min(100% - 32px, 620px); }
      .nav { min-height: 64px; }
      .nav-links { gap: 16px; }
      .nav-links a:first-child { display: none; }
      main { padding-top: 72px; }
      .hero::after { display: none; }
      h1 { font-size: clamp(42px, 13vw, 62px); }
      .apps { grid-template-columns: 1fr; margin-top: 58px; }
      .app-card { min-height: 360px; }
      .chart { width: 50%; opacity: .38; }
      .footer-inner { padding: 25px 0; align-items: flex-start; flex-direction: column; }
    }

    @media (prefers-reduced-motion: reduce) {
      * { scroll-behavior: auto !important; transition: none !important; }
    }
  </style>
</head>
<body>
  <header>
    <div class="shell nav">
      <a class="brand" href="/">Rhymage Apps</a>
      <nav class="nav-links" aria-label="주요 메뉴">
        <a href="#apps">앱</a>
        <a href="/about.html">소개</a>
        <a href="/privacy.html">개인정보처리방침</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="shell">
      <section class="hero">
        <h1>차트를 읽는<br>당신을 테스트합니다.</h1>
        <p>감이 아니라 선택으로 확인하는 트레이딩 적성 테스트</p>
      </section>

      <section class="apps" id="apps" aria-label="트레이딩 적성 테스트">
        <a class="app-card stock" href="/stockgame/">
          <span class="icon" aria-hidden="true">▥</span>
          <h2>단타 적성검사</h2>
          <p>빠른 판단과 순간의 선택이 결과를 바꿉니다.<br>당신의 단타 감각은 몇 등급일까요?</p>
          <span class="cta">테스트 시작
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M5 12h14m-5-5 5 5-5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </span>
          <span class="chart bars" aria-hidden="true">
            <i style="--h:18%"></i><i style="--h:32%"></i><i style="--h:27%"></i><i style="--h:52%"></i><i style="--h:45%"></i><i style="--h:69%"></i><i style="--h:58%"></i><i style="--h:84%"></i>
          </span>
        </a>

        <a class="app-card coin" href="/coingame/">
          <span class="icon" aria-hidden="true">₿</span>
          <h2>코인선물 적성검사</h2>
          <p>롱이냐 숏이냐, 방향을 읽는 당신의 선물 감각.<br>레버리지와 리스크를 다루는 능력을 확인하세요.</p>
          <span class="cta">테스트 시작
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M5 12h14m-5-5 5 5-5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </span>
          <span class="chart long-short" aria-hidden="true"></span>
        </a>
      </section>
    </div>
  </main>

  <footer>
    <div class="shell footer-inner">
      <span>© 2026 Rhymage Apps</span>
      <div class="footer-links">
        <a href="/about.html">소개</a>
        <a href="/privacy.html">개인정보처리방침</a>
      </div>
    </div>
  </footer>
</body>
</html>
